<!DOCTYPE html>
<html>
<head>
  <title>My Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f1ff;
      text-align: center;
      padding: 40px 20px;
    }

    .profile {
      max-width: 420px;
      margin: auto;
    }

    img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      color: #555;
    }

    a {
      display: block;
      background: #111;
      color: white;
      text-decoration: none;
      padding: 15px;
      margin: 12px 0;
      border-radius: 12px;
      font-weight: bold;
    }

    a:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="profile">
    <img src="https://via.placeholder.com/150" alt="Profile photo">

    <h1>@yourname</h1>
    <p>Creator | Designer | Entrepreneur</p>

    <a href="https://mphs.gov.my/ms/mphs/e-perkhidmatan/senarai-e-perkhidmatan?highlight=WyJlLXBlcmtoaWRtYXRhbiJd">MPHS</a>
    <a href="https://youtube.com">YouTube</a>
    <a href="https://yourwebsite.com">My Website</a>
    <a href="mailto:you@email.com">Contact Me</a>
  </div>
</body>
</html>
